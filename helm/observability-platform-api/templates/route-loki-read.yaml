{{/*
Loki read API routes (loki.enabled=true)

Resources:
  - HTTPRoute: routes read requests to loki-gateway:80 in loki.namespace.
    Rule 1: matches path + X-Scope-OrgID header (regex ^.+$) → forwards to backend.
    Rule 2: matches path only (no header) → returns 401 via HTTPRouteFilter.
  - SecurityPolicy: enforces JWT validation using auth.jwt.providers.
  - HTTPRouteFilter: returns 401 when X-Scope-OrgID header is missing.

Exposed paths:
  /loki/api/v1/labels, /loki/api/v1/label, /loki/api/v1/rules,
  /loki/api/v1/query, /loki/api/v1/query_range, /loki/api/v1/index,
  /loki/api/v1/series, /loki/api/v1/detected_labels
*/}}
{{- if .Values.loki.enabled -}}
{{- if not .Values.auth.jwt.providers }}
{{- fail "auth.jwt.providers must be set when loki is enabled" }}
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "resource.default.name" . }}-loki-read-api
  namespace: {{ .Values.loki.namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  {{- with .Values.loki.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.loki.hostname }}
  hostnames:
  - {{ tpl . $ | quote }}
  {{- end }}
  rules:
  - backendRefs:
    - name: loki-gateway
      namespace: {{ .Values.loki.namespace }}
      port: 80
    matches:
    - path:
        type: PathPrefix
        value: /loki/api/v1/labels
      headers:
      - name: X-Scope-OrgID
        value: "^.+$"
        type: RegularExpression
    - path:
        type: PathPrefix
        value: /loki/api/v1/label
      headers:
      - name: X-Scope-OrgID
        value: "^.+$"
        type: RegularExpression
    - path:
        type: PathPrefix
        value: /loki/api/v1/rules
      headers:
      - name: X-Scope-OrgID
        value: "^.+$"
        type: RegularExpression
    - path:
        type: PathPrefix
        value: /loki/api/v1/query
      headers:
      - name: X-Scope-OrgID
        value: "^.+$"
        type: RegularExpression
    - path:
        type: PathPrefix
        value: /loki/api/v1/index
      headers:
      - name: X-Scope-OrgID
        value: "^.+$"
        type: RegularExpression
    - path:
        type: PathPrefix
        value: /loki/api/v1/query_range
      headers:
      - name: X-Scope-OrgID
        value: "^.+$"
        type: RegularExpression
    - path:
        type: PathPrefix
        value: /loki/api/v1/series
      headers:
      - name: X-Scope-OrgID
        value: "^.+$"
        type: RegularExpression
    - path:
        type: PathPrefix
        value: /loki/api/v1/detected_labels
      headers:
      - name: X-Scope-OrgID
        value: "^.+$"
        type: RegularExpression
    filters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        set:
        - name: X-Scope-OrgID
          value: "%REQ(X-Scope-OrgID)%"
  - backendRefs:
    - name: loki-gateway
      namespace: {{ .Values.loki.namespace }}
      port: 80
    filters:
    - type: ExtensionRef
      extensionRef:
        group: gateway.envoyproxy.io
        kind: HTTPRouteFilter
        name: {{ include "resource.default.name" . }}-loki-read-api-headers-check
    matches:
    - path:
        type: PathPrefix
        value: /loki/api/v1/labels
    - path:
        type: PathPrefix
        value: /loki/api/v1/label
    - path:
        type: PathPrefix
        value: /loki/api/v1/rules
    - path:
        type: PathPrefix
        value: /loki/api/v1/query
    - path:
        type: PathPrefix
        value: /loki/api/v1/index
    - path:
        type: PathPrefix
        value: /loki/api/v1/query_range
    - path:
        type: PathPrefix
        value: /loki/api/v1/series
    - path:
        type: PathPrefix
        value: /loki/api/v1/detected_labels
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: {{ include "resource.default.name" . }}-loki-read-api
  namespace: {{ .Values.loki.namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: {{ include "resource.default.name" . }}-loki-read-api
  jwt:
    providers:
      {{- toYaml .Values.auth.jwt.providers | nindent 6 }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: HTTPRouteFilter
metadata:
  name: {{ include "resource.default.name" . }}-loki-read-api-headers-check
  namespace: {{ .Values.loki.namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  directResponse:
    contentType: text/plain
    statusCode: 401
    body:
      type: Inline
      inline: "Bad Request"
{{- end }}
