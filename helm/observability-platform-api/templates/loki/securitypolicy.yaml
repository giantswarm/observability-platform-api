{{/*
Loki SecurityPolicy (loki.enabled=true)

Applies JWT and/or Basic Auth to both Loki HTTPRoutes (read and write) in a single policy.
Auth methods are configured via auth.jwt.providers and loki.basicAuth.secretName.
*/}}
{{- if and .Values.loki.enabled (or .Values.auth.jwt.providers .Values.loki.basicAuth.secretName) -}}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: {{ include "resource.default.name" . }}-loki
  namespace: {{ .Values.loki.namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: {{ include "resource.default.name" . }}-loki-read-api
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: {{ include "resource.default.name" . }}-loki-write-api
  - group: gateway.networking.k8s.io
    kind: GRPCRoute
    name: {{ include "resource.default.name" . }}-loki-write-api-grpc
  {{- if .Values.auth.jwt.providers }}
  jwt:
    {{- if .Values.loki.basicAuth.secretName }}
    optional: true
    {{- end }}
    providers:
      {{- toYaml .Values.auth.jwt.providers | nindent 6 }}
  {{- end }}
  {{- if .Values.loki.basicAuth.secretName }}
  basicAuth:
    users:
      name: {{ .Values.loki.basicAuth.secretName }}
  {{- end }}
{{- end }}
