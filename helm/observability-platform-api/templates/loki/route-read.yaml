{{/*
Loki read API routes (loki.enabled=true)

Resources:
  - HTTPRoute: routes read requests to loki-gateway:80 in loki.namespace.
    Rule 1: matches path + X-Scope-OrgID header (regex ^.+$) → forwards to backend.
    Rule 2: matches path only (no header) → returns 401 via HTTPRouteFilter.

Exposed paths (configured via loki.readPaths):
  /loki/api/v1/labels, /loki/api/v1/label, /loki/api/v1/rules,
  /loki/api/v1/query, /loki/api/v1/query_range, /loki/api/v1/index,
  /loki/api/v1/series, /loki/api/v1/detected_labels
*/}}
{{- if and .Values.loki.enabled (or .Values.auth.jwt.providers .Values.loki.basicAuth.secretName) -}}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "resource.default.name" . }}-loki-read-api
  namespace: {{ .Values.loki.namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  {{- with .Values.loki.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.loki.hostname }}
  hostnames:
  - {{ tpl . $ | quote }}
  {{- end }}
  rules:
  - backendRefs:
    - name: loki-gateway
      namespace: {{ .Values.loki.namespace }}
      port: 80
    matches:
    {{- range .Values.loki.read.paths }}
    - path:
        type: PathPrefix
        value: {{ . }}
      headers:
      - name: X-Scope-OrgID
        value: "^.+$"
        type: RegularExpression
    {{- end }}
    filters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        set:
        - name: X-Scope-OrgID
          value: "%REQ(X-Scope-OrgID)%"
  - backendRefs:
    - name: loki-gateway
      namespace: {{ .Values.loki.namespace }}
      port: 80
    filters:
    - type: ExtensionRef
      extensionRef:
        group: gateway.envoyproxy.io
        kind: HTTPRouteFilter
        name: {{ include "resource.default.name" . }}-loki-headers-check
    matches:
    {{- range .Values.loki.read.paths }}
    - path:
        type: PathPrefix
        value: {{ . }}
    {{- end }}
{{- end }}
