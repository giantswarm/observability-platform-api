{{- if and .Values.loki.enabled .Values.loki.routes.enabled -}}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "resource.default.name" . }}-loki-write-api
  namespace: {{ .Values.loki.namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  {{- with .Values.loki.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.loki.hostname }}
  hostnames:
  - {{ tpl . $ | quote }}
  {{- end }}
  rules:
  - backendRefs:
    - name: loki-gateway
      namespace: {{ .Values.loki.namespace }}
      port: 80
    matches:
    - path:
        type: PathPrefix
        value: /loki/api/v1/push
      headers:
      - name: X-Scope-OrgID
        value: "^.+$"
        type: RegularExpression
    filters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        set:
        - name: X-Scope-OrgID
          value: "%REQ(X-Scope-OrgID)%"
  - backendRefs:
    - name: loki-gateway
      namespace: {{ .Values.loki.namespace }}
      port: 80
    filters:
    - type: ExtensionRef
      extensionRef:
        group: gateway.envoyproxy.io
        kind: HTTPRouteFilter
        name: {{ include "resource.default.name" . }}-loki-write-api-headers-check
    matches:
    - path:
        type: PathPrefix
        value: /loki/api/v1/push
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: {{ include "resource.default.name" . }}-loki-write-api
  namespace: {{ .Values.loki.namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: {{ include "resource.default.name" . }}-loki-write-api
  extAuth:
    http:
      backendRefs:
      - name: oauth2-proxy-observability-platform-api
        namespace: monitoring
        port: 4180
      path: /oauth2/observability-platform-api/auth
      headersToExtAuth:
      - Authorization
      - Cookie
      - X-Scope-OrgID
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: HTTPRouteFilter
metadata:
  name: {{ include "resource.default.name" . }}-loki-write-api-headers-check
  namespace: {{ .Values.loki.namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  directResponse:
    contentType: text/plain
    statusCode: 400
    body:
      type: Inline
      inline: "Bad Request"
{{- end }}
