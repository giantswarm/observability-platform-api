{{/*
Tempo OTLP write API route (tempo.enabled=true)

Resources:
  - HTTPRoute: routes OTLP trace ingestion to tempo-distributor:4318 in tempo.namespace.
    Rule 1: matches /v1/traces + X-Scope-OrgID header → forwards to backend.
    Rule 2: matches /v1/traces only (no header) → returns 401 via HTTPRouteFilter.
  - SecurityPolicy: enforces JWT validation using auth.jwt.providers.
  - HTTPRouteFilter: returns 401 when X-Scope-OrgID header is missing.

Exposed paths:
  /v1/traces  (OTLP HTTP trace ingestion)
*/}}
{{- if and .Values.tempo.enabled .Values.auth.jwt.providers -}}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "resource.default.name" . }}-tempo-otlp-write-api
  namespace: {{ .Values.tempo.namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  {{- with .Values.tempo.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.tempo.hostname }}
  hostnames:
  - {{ tpl . $ | quote }}
  {{- end }}
  rules:
  - backendRefs:
    - name: tempo-distributor
      namespace: {{ .Values.tempo.namespace }}
      port: 4318
    matches:
    - path:
        type: PathPrefix
        value: /v1/traces
      headers:
      - name: X-Scope-OrgID
        value: "^.+$"
        type: RegularExpression
    filters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        set:
        - name: X-Scope-OrgID
          value: "%REQ(X-Scope-OrgID)%"
  - backendRefs:
    - name: tempo-distributor
      namespace: {{ .Values.tempo.namespace }}
      port: 4318
    filters:
    - type: ExtensionRef
      extensionRef:
        group: gateway.envoyproxy.io
        kind: HTTPRouteFilter
        name: {{ include "resource.default.name" . }}-tempo-otlp-write-api-headers-check
    matches:
    - path:
        type: PathPrefix
        value: /v1/traces
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: {{ include "resource.default.name" . }}-tempo-otlp-write-api
  namespace: {{ .Values.tempo.namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: {{ include "resource.default.name" . }}-tempo-otlp-write-api
  jwt:
    providers:
      {{- toYaml .Values.auth.jwt.providers | nindent 6 }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: HTTPRouteFilter
metadata:
  name: {{ include "resource.default.name" . }}-tempo-otlp-write-api-headers-check
  namespace: {{ .Values.tempo.namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  directResponse:
    contentType: text/plain
    statusCode: 401
    body:
      type: Inline
      inline: "Bad Request"
{{- end }}
