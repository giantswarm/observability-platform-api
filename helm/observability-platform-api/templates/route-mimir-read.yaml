{{/*
Mimir read API routes (mimir.enabled=true)

Resources:
  - HTTPRoute: routes read requests to mimir-gateway:80 in mimir.namespace.
    Rule 1: matches path + X-Scope-OrgID header (regex ^.+$) → forwards to backend.
    Rule 2: matches path only (no header) → returns 401 via HTTPRouteFilter.
  - SecurityPolicy: enforces JWT validation using auth.jwt.providers.
  - HTTPRouteFilter: returns 401 when X-Scope-OrgID header is missing.

Exposed paths (Prometheus-compatible API):
  /prometheus/api/v1/labels, /prometheus/api/v1/label, /prometheus/api/v1/rules,
  /prometheus/api/v1/query, /prometheus/api/v1/query_range,
  /prometheus/api/v1/query_exemplars, /prometheus/api/v1/status,
  /prometheus/api/v1/metadata, /prometheus/api/v1/detected_labels
*/}}
{{- if .Values.mimir.enabled -}}
{{- if not .Values.auth.jwt.providers }}
{{- fail "auth.jwt.providers must be set when mimir is enabled" }}
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "resource.default.name" . }}-mimir-read-api
  namespace: {{ .Values.mimir.namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  {{- with .Values.mimir.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.mimir.hostname }}
  hostnames:
  - {{ tpl . $ | quote }}
  {{- end }}
  rules:
  - backendRefs:
    - name: mimir-gateway
      namespace: {{ .Values.mimir.namespace }}
      port: 80
    matches:
    - path:
        type: PathPrefix
        value: /prometheus/api/v1/labels
      headers:
      - name: X-Scope-OrgID
        value: "^.+$"
        type: RegularExpression
    - path:
        type: PathPrefix
        value: /prometheus/api/v1/label
      headers:
      - name: X-Scope-OrgID
        value: "^.+$"
        type: RegularExpression
    - path:
        type: PathPrefix
        value: /prometheus/api/v1/rules
      headers:
      - name: X-Scope-OrgID
        value: "^.+$"
        type: RegularExpression
    - path:
        type: PathPrefix
        value: /prometheus/api/v1/query
      headers:
      - name: X-Scope-OrgID
        value: "^.+$"
        type: RegularExpression
    - path:
        type: PathPrefix
        value: /prometheus/api/v1/query_exemplars
      headers:
      - name: X-Scope-OrgID
        value: "^.+$"
        type: RegularExpression
    - path:
        type: PathPrefix
        value: /prometheus/api/v1/query_range
      headers:
      - name: X-Scope-OrgID
        value: "^.+$"
        type: RegularExpression
    - path:
        type: PathPrefix
        value: /prometheus/api/v1/status
      headers:
      - name: X-Scope-OrgID
        value: "^.+$"
        type: RegularExpression
    - path:
        type: PathPrefix
        value: /prometheus/api/v1/metadata
      headers:
      - name: X-Scope-OrgID
        value: "^.+$"
        type: RegularExpression
    - path:
        type: PathPrefix
        value: /prometheus/api/v1/detected_labels
      headers:
      - name: X-Scope-OrgID
        value: "^.+$"
        type: RegularExpression
    filters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        set:
        - name: X-Scope-OrgID
          value: "%REQ(X-Scope-OrgID)%"
  - backendRefs:
    - name: mimir-gateway
      namespace: {{ .Values.mimir.namespace }}
      port: 80
    filters:
    - type: ExtensionRef
      extensionRef:
        group: gateway.envoyproxy.io
        kind: HTTPRouteFilter
        name: {{ include "resource.default.name" . }}-mimir-read-api-headers-check
    matches:
    - path:
        type: PathPrefix
        value: /prometheus/api/v1/labels
    - path:
        type: PathPrefix
        value: /prometheus/api/v1/label
    - path:
        type: PathPrefix
        value: /prometheus/api/v1/rules
    - path:
        type: PathPrefix
        value: /prometheus/api/v1/query
    - path:
        type: PathPrefix
        value: /prometheus/api/v1/query_exemplars
    - path:
        type: PathPrefix
        value: /prometheus/api/v1/query_range
    - path:
        type: PathPrefix
        value: /prometheus/api/v1/status
    - path:
        type: PathPrefix
        value: /prometheus/api/v1/metadata
    - path:
        type: PathPrefix
        value: /prometheus/api/v1/detected_labels
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: {{ include "resource.default.name" . }}-mimir-read-api
  namespace: {{ .Values.mimir.namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: {{ include "resource.default.name" . }}-mimir-read-api
  jwt:
    providers:
      {{- toYaml .Values.auth.jwt.providers | nindent 6 }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: HTTPRouteFilter
metadata:
  name: {{ include "resource.default.name" . }}-mimir-read-api-headers-check
  namespace: {{ .Values.mimir.namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  directResponse:
    contentType: text/plain
    statusCode: 401
    body:
      type: Inline
      inline: "Bad Request"
{{- end }}
