{{/*
Mimir SecurityPolicy (mimir.enabled=true)

Applies JWT and/or Basic Auth to both Mimir HTTPRoutes (read and write) in a single policy.
Auth methods are configured via auth.jwt.providers and mimir.basicAuth.secretName.
*/}}
{{- if and .Values.mimir.enabled (or .Values.auth.jwt.providers .Values.mimir.basicAuth.secretName) -}}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: {{ include "resource.default.name" . }}-mimir
  namespace: {{ .Values.mimir.namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: {{ include "resource.default.name" . }}-mimir-read-api
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: {{ include "resource.default.name" . }}-mimir-write-api
  {{- if .Values.auth.jwt.providers }}
  jwt:
    {{- if .Values.mimir.basicAuth.secretName }}
    optional: true
    {{- end }}
    providers:
      {{- toYaml .Values.auth.jwt.providers | nindent 6 }}
  {{- end }}
  {{- if .Values.mimir.basicAuth.secretName }}
  basicAuth:
    users:
      name: {{ .Values.mimir.basicAuth.secretName }}
  {{- end }}
{{- end }}
