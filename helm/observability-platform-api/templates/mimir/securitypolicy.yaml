{{/*
Mimir SecurityPolicy (mimir.enabled=true)

Applies JWT to both Mimir HTTPRoutes (read and write) in a single policy.
Auth is configured via auth.jwt.providers.
*/}}
{{- if and .Values.mimir.enabled .Values.auth.jwt.providers -}}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: {{ include "resource.default.name" . }}-mimir
  namespace: {{ .Values.mimir.namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: {{ include "resource.default.name" . }}-mimir-read-api
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: {{ include "resource.default.name" . }}-mimir-write-api
  jwt:
    providers:
      {{- toYaml .Values.auth.jwt.providers | nindent 6 }}
{{- end }}
