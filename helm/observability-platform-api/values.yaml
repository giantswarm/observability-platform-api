name: observability-platform-api
serviceType: managed

# -- Auth configuration for all routes.
auth:
  jwt:
    # -- List of trusted JWT providers. Each entry must be a valid OIDC issuer.
    # Supports multiple providers (e.g. Dex + Azure AD).
    # Required when any of loki.enabled, mimir.enabled, or tempo.enabled is true.
    providers: []
    # Example:
    # providers:
    # - name: dex
    #   issuer: "https://dex.mycluster.example.com"
    #   remoteJWKS:
    #     uri: "https://dex.mycluster.example.com/keys"
    # - name: azure-ad
    #   issuer: "https://login.microsoftonline.com/<tenant-id>/v2.0"
    #   remoteJWKS:
    #     uri: "https://login.microsoftonline.com/<tenant-id>/discovery/v2.0/keys"

loki:
  enabled: false
  namespace: loki
  # -- Hostname for all Loki routes. Supports Helm template strings.
  hostname: ""
  parentRefs:
  - name: giantswarm-default
    namespace: envoy-gateway-system

mimir:
  enabled: false
  namespace: mimir
  # -- Hostname for all Mimir routes. Supports Helm template strings.
  hostname: ""
  parentRefs:
  - name: giantswarm-default
    namespace: envoy-gateway-system

tempo:
  enabled: false
  namespace: tempo
  # -- Hostname for all Tempo routes. Supports Helm template strings.
  hostname: ""
  parentRefs:
  - name: giantswarm-default
    namespace: envoy-gateway-system

ingresses:
  - name: loki
    namespace: loki
    service:
      name: loki-gateway
      port: 80
    ingressClassName: nginx
    hosts:
      - host: observability.giantswarm.io
        paths: []
    # Optional: specify custom TLS secret name otherwise, the secret is shared in one namespace
    # tls:
    #   secretName: shared-observability-tls
  - name: mimir
    namespace: mimir
    service:
      name: mimir-gateway
      port: 80
    ingressClassName: nginx
    hosts:
      - host: observability.giantswarm.io
        paths: []
    # Optional: specify custom TLS secret name otherwise, the secret is shared in one namespace
    # tls:
    #   secretName: shared-observability-tls
